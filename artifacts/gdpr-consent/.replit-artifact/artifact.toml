kind = "web"
previewPath = "/"
title = "CookieLite — GDPR Cookie Consent"
version = "1.0.0"
id = "artifacts/gdpr-consent"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20648

[services.development]
run = "pnpm --filter @workspace/gdpr-consent run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/gdpr-consent", "run", "build" ]
publicDir = "artifacts/gdpr-consent/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20648"
BASE_PATH = "/"
